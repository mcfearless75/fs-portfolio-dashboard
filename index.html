<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FS Portfolio Intelligence | TVG Data Demand</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080A15;--surface:#0F1225;--surface2:#161A30;--border:#1E2340;
    --text:#E8EBF4;--text2:#8B92B0;--text3:#555E7A;
    --blue:#3B82F6;--blue-dim:#1D3461;--blue-glow:rgba(59,130,246,.15);
    --green:#22C55E;--green-dim:#14532D;
    --amber:#F59E0B;--amber-dim:#451A03;
    --red:#EF4444;--red-dim:#450A0A;
    --purple:#A855F7;--purple-dim:#3B0764;
    --cyan:#06B6D4;
    --radius:8px;--radius-lg:12px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
  #root{min-height:100vh}

  /* ── Scrollbars ── */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* ── Typography ── */
  h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
  h2{font-size:14px;font-weight:600;letter-spacing:-.2px}
  h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2)}

  /* ── Layout ── */
  .app{display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .logo-badge{background:linear-gradient(135deg,var(--blue),var(--purple));width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
  .topbar-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
  .topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .last-updated{font-size:11px;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

  /* ── Tabs ── */
  .tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px}
  .tab{padding:12px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
  .tab-icon{margin-right:6px;font-size:13px}

  /* ── Page ── */
  .page{padding:24px;max-width:1400px;margin:0 auto;width:100%}

  /* ── Cards ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:900px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
  @media(max-width:560px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

  /* ── KPI Tiles ── */
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:6px}
  .kpi-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
  .kpi-value{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
  .kpi-sub{font-size:11px;color:var(--text3)}
  .kpi.green .kpi-value{color:var(--green)}
  .kpi.amber .kpi-value{color:var(--amber)}
  .kpi.red .kpi-value{color:var(--red)}
  .kpi.blue .kpi-value{color:var(--blue)}

  /* ── RAG Badges ── */
  .rag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
  .rag.green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
  .rag.amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
  .rag.red{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
  .rag.blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
  .rag-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* ── Epic Row ── */
  .epic-table{width:100%;border-collapse:collapse}
  .epic-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .epic-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .epic-table tr:last-child td{border-bottom:none}
  .epic-table tr:hover td{background:var(--surface2)}
  .epic-id{font-family:monospace;font-size:11px;color:var(--blue);font-weight:600;background:var(--blue-dim);padding:2px 7px;border-radius:4px}
  .epic-name{font-weight:500;font-size:13px;color:var(--text)}
  .epic-owner{font-size:11px;color:var(--text2)}
  .progress-bar-wrap{background:var(--border);border-radius:4px;height:6px;width:120px;overflow:hidden}
  .progress-bar-fill{height:100%;border-radius:4px;transition:width .3s}

  /* ── Progress bar colours ── */
  .fill-green{background:var(--green)}
  .fill-amber{background:var(--amber)}
  .fill-red{background:var(--red)}
  .fill-blue{background:var(--blue)}

  /* ── Decision tracker ── */
  .decision-row{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
  .decision-row:last-child{border-bottom:none}
  .decision-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);margin-top:5px;flex-shrink:0}
  .decision-dot.resolved{background:var(--green)}
  .decision-dot.blocked{background:var(--red)}
  .decision-text{font-size:12px;color:var(--text)}
  .decision-meta{font-size:11px;color:var(--text3);margin-top:2px}

  /* ── Dependency map ── */
  .dep-grid{display:flex;flex-direction:column;gap:8px}
  .dep-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px}
  .dep-from{font-size:12px;font-weight:600;color:var(--text);min-width:120px}
  .dep-arrow{color:var(--text3);font-size:16px}
  .dep-to{font-size:12px;color:var(--text2);flex:1}
  .dep-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:12px}
  .dep-type.blocks{background:var(--red-dim);color:var(--red)}
  .dep-type.needs{background:var(--amber-dim);color:var(--amber)}
  .dep-type.informs{background:var(--blue-dim);color:var(--blue)}

  /* ── Weekly Draft ── */
  .draft-area{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;min-height:200px;max-height:500px;overflow-y:auto}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;letter-spacing:.2px}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{background:#2563EB}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .btn-secondary:hover{color:var(--text);border-color:var(--text3)}
  .btn-group{display:flex;gap:8px;flex-wrap:wrap}
  .loading-pulse{animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Automation cards ── */
  .auto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
  .auto-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .auto-name{font-size:13px;font-weight:600}
  .auto-desc{font-size:12px;color:var(--text2);line-height:1.6}
  .toggle-wrap{display:flex;align-items:center;gap:8px}
  .toggle{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background .2s}
  .toggle.on{background:var(--blue)}
  .toggle-knob{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .toggle.on .toggle-knob{transform:translateX(16px)}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .tag-auto{background:var(--purple-dim);color:var(--purple)}
  .tag-manual{background:var(--surface2);color:var(--text3)}

  /* ── Milestone chip ── */
  .milestone-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
  .milestone-chip.urgent{background:var(--red-dim);color:var(--red)}
  .milestone-chip.soon{background:var(--amber-dim);color:var(--amber)}
  .milestone-chip.ok{background:var(--green-dim);color:var(--green)}

  /* ── Misc ── */
  .section-gap{display:flex;flex-direction:column;gap:16px}
  .row-gap{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0}
  .empty{color:var(--text3);font-size:12px;text-align:center;padding:32px 0}
  .chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .textarea-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border .15s}
  .textarea-field:focus{border-color:var(--blue)}
  .copy-btn{font-size:11px;padding:5px 10px}
  .badge-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--red);color:#fff;border-radius:50%;font-size:10px;font-weight:700;margin-left:6px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── LIVE DATA ────────────────────────────────────────────────────────────────
const TODAY = new Date();

function daysSince(dateStr) {
  const d = new Date(dateStr);
  return Math.floor((TODAY - d) / 86400000);
}
function daysUntil(dateStr) {
  const d = new Date(dateStr);
  return Math.ceil((d - TODAY) / 86400000);
}

function calcRAG(lastUpdated, nextMilestone) {
  const staleDays = daysSince(lastUpdated);
  const mileDays = nextMilestone ? daysUntil(nextMilestone) : null;
  if (staleDays > 60 || (mileDays !== null && mileDays <= 7)) return 'red';
  if (staleDays > 30 || (mileDays !== null && mileDays <= 14)) return 'amber';
  return 'green';
}

const EPICS = [
  {
    id: 'DPD-757',
    name: 'Data Demand Request Intake & Triage',
    owner: 'Paul McWilliam',
    tribe: 'Financial Services',
    progress: 65,
    lastUpdated: '2025-05-20',
    nextMilestone: '2025-06-20',
    milestoneLabel: 'UAT Sign-off',
    status: 'In Progress',
    decisions: [
      { text: 'Agree SLA tiers with FS tribe leads', status: 'open', date: 'Due 16 Jun', owner: 'Paul McWilliam' },
      { text: 'Confirm Starburst query log retention period', status: 'resolved', date: 'Resolved 3 Jun', owner: 'Data Engineering' },
      { text: 'Jira workflow approval — escalation path', status: 'open', date: 'Due 23 Jun', owner: 'Governance' },
    ],
    notes: 'Intake form v3 finalised. Triage logic in Jira automated. Pending SLA sign-off from tribe leads before UAT.',
  },
  {
    id: 'DPD-754',
    name: 'Starburst / Trino Query Monitoring Dashboard',
    owner: 'Paul McWilliam',
    tribe: 'Financial Services',
    progress: 40,
    lastUpdated: '2025-05-10',
    nextMilestone: '2025-07-04',
    milestoneLabel: 'Power BI Release',
    status: 'In Progress',
    decisions: [
      { text: 'Define threshold alerts for query cost > £500/day', status: 'open', date: 'Due 30 Jun', owner: 'Paul McWilliam' },
      { text: 'Access permissions for BI team to Starburst metrics', status: 'blocked', date: 'Blocked — infra ticket open', owner: 'Platform' },
    ],
    notes: 'Power BI build spec drafted. Waiting on Starburst metrics API access from Platform team. Infra ticket DPD-888 open.',
  },
  {
    id: 'DPD-905',
    name: 'FS Data Catalogue & Lineage Mapping',
    owner: 'Paul McWilliam',
    tribe: 'Financial Services',
    progress: 20,
    lastUpdated: '2025-04-28',
    nextMilestone: '2025-08-01',
    milestoneLabel: 'MVP Catalogue Launch',
    status: 'At Risk',
    decisions: [
      { text: 'Tooling decision: Collibra vs Alation vs build', status: 'open', date: 'Due 14 Jun', owner: 'Architecture' },
      { text: 'Scope: FS tribe only vs cross-tribe', status: 'open', date: 'Due 21 Jun', owner: 'Paul McWilliam' },
    ],
    notes: 'Stalled pending tooling decision. Architecture review scheduled for 14 Jun. Risk of missing MVP date if decision slips.',
  },
  {
    id: 'DPD-901',
    name: 'Self-Serve Analytics Enablement (FS)',
    owner: 'Paul McWilliam',
    tribe: 'Financial Services',
    progress: 55,
    lastUpdated: '2025-05-30',
    nextMilestone: '2025-06-27',
    milestoneLabel: 'Training Rollout',
    status: 'On Track',
    decisions: [
      { text: 'Confirm Power BI workspace structure with FS leads', status: 'resolved', date: 'Resolved 28 May', owner: 'Paul McWilliam' },
      { text: 'Training format: live vs recorded vs hybrid', status: 'open', date: 'Due 16 Jun', owner: 'L&D' },
    ],
    notes: '3 Power BI workspaces provisioned. Training materials 70% complete. L&D format decision outstanding.',
  },
  {
    id: 'DPD-915',
    name: 'Data Demand FY27 Planning & Governance',
    owner: 'Paul McWilliam',
    tribe: 'Financial Services',
    progress: 80,
    lastUpdated: '2025-06-02',
    nextMilestone: '2025-06-13',
    milestoneLabel: 'SteerCo Presentation',
    status: 'On Track',
    decisions: [
      { text: 'FY27 capacity model sign-off with Finance', status: 'open', date: 'Due 11 Jun', owner: 'Finance' },
      { text: 'Quarterly review cadence agreed', status: 'resolved', date: 'Resolved 2 Jun', owner: 'Paul McWilliam' },
    ],
    notes: 'Delivery plan PowerPoint complete. SteerCo deck 80% done. Finance capacity sign-off needed before 13 Jun presentation.',
  },
];

const DEPENDENCIES = [
  { from: 'DPD-754', to: 'DPD-757', type: 'needs', label: 'Intake data feeds into query monitoring metrics' },
  { from: 'DPD-905', to: 'Architecture Board', type: 'blocks', label: 'Tooling decision required before catalogue build starts' },
  { from: 'DPD-901', to: 'DPD-754', type: 'informs', label: 'Self-serve adoption drives query volume baselines' },
  { from: 'DPD-915', to: 'DPD-757', type: 'informs', label: 'FY27 plan sets intake SLA targets' },
  { from: 'DPD-915', to: 'DPD-905', type: 'informs', label: 'Governance framework shapes catalogue scope' },
  { from: 'DPD-754', to: 'Platform Team', type: 'blocks', label: 'Blocked: infra access ticket DPD-888' },
  { from: 'DPD-901', to: 'L&D Team', type: 'needs', label: 'Training format decision due 16 Jun' },
];

const AUTOMATIONS = [
  { id: 1, name: 'Stale Epic Alerts', desc: 'Flags epics with no update in >14 days. Sends Confluence comment and Jira comment.', enabled: true, type: 'auto', lastRun: '2025-06-08' },
  { id: 2, name: 'Weekly Status Digest', desc: 'Generates this week\'s programme status summary every Monday 08:00 and drafts Confluence page.', enabled: true, type: 'auto', lastRun: '2025-06-09' },
  { id: 3, name: 'Milestone Countdown', desc: 'Posts Jira comment 14 days and 7 days before each epic milestone.', enabled: true, type: 'auto', lastRun: '2025-06-05' },
  { id: 4, name: 'Decision Log Reminder', desc: 'Pings open decisions overdue by >3 days to the assigned owner via Jira comment.', enabled: false, type: 'manual', lastRun: '2025-05-20' },
  { id: 5, name: 'Power BI Refresh Monitor', desc: 'Checks Power BI workspace refresh status daily. Alerts if >2 datasets fail.', enabled: true, type: 'auto', lastRun: '2025-06-09' },
  { id: 6, name: 'SteerCo Pack Assembler', desc: 'Collates epic snapshots + RAG matrix into a Word doc skeleton ready for review.', enabled: false, type: 'manual', lastRun: 'Never' },
];

// ─── RAG HELPERS ─────────────────────────────────────────────────────────────
function RagBadge({ rag }) {
  const labels = { green: 'GREEN', amber: 'AMBER', red: 'RED', blue: 'INFO' };
  return (
    <span className={`rag ${rag}`}>
      <span className="rag-dot"></span>
      {labels[rag] || rag.toUpperCase()}
    </span>
  );
}

function MilestoneChip({ epic }) {
  const days = daysUntil(epic.nextMilestone);
  let cls = 'ok', label = '';
  if (days <= 7) { cls = 'urgent'; label = `${days}d`; }
  else if (days <= 14) { cls = 'soon'; label = `${days}d`; }
  else { label = `${days}d`; }
  return (
    <span className={`milestone-chip ${cls}`}>
      ⏱ {epic.milestoneLabel} · {label}
    </span>
  );
}

function ProgressBar({ pct, rag }) {
  const clsMap = { green: 'fill-green', amber: 'fill-amber', red: 'fill-red', blue: 'fill-blue' };
  return (
    <div className="progress-bar-wrap">
      <div className={`progress-bar-fill ${clsMap[rag] || 'fill-blue'}`} style={{ width: `${pct}%` }}/>
    </div>
  );
}

// ─── TAB: PORTFOLIO HEALTH ────────────────────────────────────────────────────
function TabPortfolio() {
  const epicsWithRAG = EPICS.map(e => ({ ...e, rag: calcRAG(e.lastUpdated, e.nextMilestone) }));
  const reds = epicsWithRAG.filter(e => e.rag === 'red').length;
  const ambers = epicsWithRAG.filter(e => e.rag === 'amber').length;
  const greens = epicsWithRAG.filter(e => e.rag === 'green').length;
  const openDecisions = EPICS.flatMap(e => e.decisions).filter(d => d.status === 'open').length;
  const blocked = EPICS.flatMap(e => e.decisions).filter(d => d.status === 'blocked').length;

  const [expanded, setExpanded] = useState(null);

  return (
    <div className="page section-gap">
      {/* KPI Row */}
      <div className="grid-4">
        <div className={`kpi ${reds > 0 ? 'red' : 'green'}`}>
          <div className="kpi-label">🔴 RED Epics</div>
          <div className="kpi-value">{reds}</div>
          <div className="kpi-sub">Require immediate action</div>
        </div>
        <div className={`kpi ${ambers > 0 ? 'amber' : 'green'}`}>
          <div className="kpi-label">🟡 AMBER Epics</div>
          <div className="kpi-value">{ambers}</div>
          <div className="kpi-sub">Monitor closely</div>
        </div>
        <div className="kpi green">
          <div className="kpi-label">🟢 GREEN Epics</div>
          <div className="kpi-value">{greens}</div>
          <div className="kpi-sub">On track</div>
        </div>
        <div className={`kpi ${blocked > 0 ? 'red' : openDecisions > 0 ? 'amber' : 'green'}`}>
          <div className="kpi-label">⚡ Open Decisions</div>
          <div className="kpi-value">{openDecisions}</div>
          <div className="kpi-sub">{blocked} blocked</div>
        </div>
      </div>

      {/* Epic Table */}
      <div className="card">
        <div className="card-header">
          <h2>Live Epics — Financial Services Tribe</h2>
          <span className="chip">Last refreshed: {TODAY.toLocaleDateString('en-GB')}</span>
        </div>
        <div style={{ overflowX: 'auto' }}>
          <table className="epic-table" style={{ width: '100%' }}>
            <thead>
              <tr>
                <th>Epic</th>
                <th>Name</th>
                <th>RAG</th>
                <th>Progress</th>
                <th>Next Milestone</th>
                <th>Status</th>
                <th>Stale Days</th>
              </tr>
            </thead>
            <tbody>
              {epicsWithRAG.map(epic => (
                <React.Fragment key={epic.id}>
                  <tr
                    style={{ cursor: 'pointer' }}
                    onClick={() => setExpanded(expanded === epic.id ? null : epic.id)}
                  >
                    <td><span className="epic-id">{epic.id}</span></td>
                    <td>
                      <div className="epic-name">{epic.name}</div>
                      <div className="epic-owner">{epic.owner}</div>
                    </td>
                    <td><RagBadge rag={epic.rag} /></td>
                    <td>
                      <div className="row-gap" style={{ gap: '8px' }}>
                        <ProgressBar pct={epic.progress} rag={epic.rag} />
                        <span style={{ fontSize: '11px', color: 'var(--text2)' }}>{epic.progress}%</span>
                      </div>
                    </td>
                    <td><MilestoneChip epic={epic} /></td>
                    <td>
                      <span className={`rag ${epic.status === 'On Track' ? 'green' : epic.status === 'At Risk' ? 'amber' : 'blue'}`}>
                        <span className="rag-dot"></span>
                        {epic.status}
                      </span>
                    </td>
                    <td>
                      <span style={{ fontSize: '12px', color: daysSince(epic.lastUpdated) > 30 ? 'var(--amber)' : 'var(--text2)' }}>
                        {daysSince(epic.lastUpdated)}d
                      </span>
                    </td>
                  </tr>
                  {expanded === epic.id && (
                    <tr>
                      <td colSpan={7} style={{ padding: 0 }}>
                        <div style={{ background: 'var(--surface2)', padding: '16px', borderLeft: `3px solid var(--${epic.rag === 'green' ? 'green' : epic.rag === 'amber' ? 'amber' : 'red'})` }}>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                            <div>
                              <h3 style={{ marginBottom: '8px' }}>Programme Notes</h3>
                              <p style={{ fontSize: '12px', color: 'var(--text2)', lineHeight: 1.7 }}>{epic.notes}</p>
                            </div>
                            <div>
                              <h3 style={{ marginBottom: '8px' }}>Decisions & Actions</h3>
                              <div>
                                {epic.decisions.map((d, i) => (
                                  <div key={i} className="decision-row">
                                    <div className={`decision-dot ${d.status}`}></div>
                                    <div>
                                      <div className="decision-text">{d.text}</div>
                                      <div className="decision-meta">{d.date} · {d.owner}</div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: '12px', fontSize: '11px', color: 'var(--text3)' }}>
          RAG engine: Stale &gt;30d = AMBER · Stale &gt;60d = RED · Milestone ≤14d = AMBER · Milestone ≤7d = RED · Click row to expand decisions
        </div>
      </div>
    </div>
  );
}

// ─── TAB: WEEKLY DRAFT ────────────────────────────────────────────────────────
function TabWeeklyDraft() {
  const [loading, setLoading] = useState(false);
  const [draft, setDraft] = useState('');
  const [additionalContext, setAdditionalContext] = useState('');
  const [copied, setCopied] = useState(false);
  const [error, setError] = useState('');

  const buildPrompt = () => {
    const epicsWithRAG = EPICS.map(e => ({ ...e, rag: calcRAG(e.lastUpdated, e.nextMilestone) }));
    const lines = epicsWithRAG.map(e =>
      `- ${e.id} (${e.name}): ${e.rag.toUpperCase()} · ${e.progress}% · Next: ${e.milestoneLabel} in ${daysUntil(e.nextMilestone)}d · Open decisions: ${e.decisions.filter(d=>d.status==='open').length}`
    ).join('\n');
    const decisions = EPICS.flatMap(e => e.decisions.filter(d => d.status === 'open').map(d => `  • [${e.id}] ${d.text} — ${d.date}`)).join('\n');
    const blockers = EPICS.flatMap(e => e.decisions.filter(d => d.status === 'blocked').map(d => `  • [${e.id}] ${d.text}`)).join('\n');

    return `You are a programme manager at The Very Group, Financial Services tribe, writing a concise weekly status update for senior stakeholders and the SteerCo.

Today's date: ${TODAY.toLocaleDateString('en-GB')}
Programme: Data Demand Programme — FS Tribe

EPIC STATUS:
${lines}

OPEN DECISIONS REQUIRING ESCALATION:
${decisions || 'None'}

ACTIVE BLOCKERS:
${blockers || 'None'}

ADDITIONAL CONTEXT FROM PM:
${additionalContext || 'None provided'}

Write a professional weekly status update in this structure:
1. HEADLINE (1 sentence: overall RAG + key message)
2. PROGRESS THIS WEEK (bullet points per epic, 1 line each)
3. DECISIONS REQUIRED (numbered list with owner and deadline)
4. BLOCKERS (if any)
5. NEXT WEEK FOCUS (top 3 priorities)

Keep it concise, factual, and senior-stakeholder friendly. Use UK English. No fluff.`;
  };

  const generateDraft = async () => {
    setLoading(true);
    setDraft('');
    setError('');
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: buildPrompt() }]
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }
      const data = await response.json();
      const text = data.content?.map(b => b.text || '').join('') || '';
      setDraft(text);
    } catch (e) {
      setError(`⚠️ ${e.message}\n\nNote: The API call must be made from claude.ai where authentication is handled automatically.`);
    } finally {
      setLoading(false);
    }
  };

  const copyToClipboard = () => {
    navigator.clipboard.writeText(draft).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  return (
    <div className="page section-gap">
      <div className="card">
        <div className="card-header">
          <h2>Weekly Status Draft Generator</h2>
          <span className="chip">Powered by Claude AI</span>
        </div>
        <p style={{ fontSize: '12px', color: 'var(--text2)', marginBottom: '16px', lineHeight: 1.7 }}>
          Generates a senior-stakeholder weekly status update from live epic data, open decisions, and blockers.
          Add any additional context below before generating.
        </p>
        <div style={{ marginBottom: '12px' }}>
          <label style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text2)', display: 'block', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '.5px' }}>
            Additional Context (optional)
          </label>
          <textarea
            className="textarea-field"
            placeholder="e.g. Finance confirmed FY27 budget uplift this week. Architecture board moved to 21 Jun. Key stakeholder holiday next week..."
            value={additionalContext}
            onChange={e => setAdditionalContext(e.target.value)}
          />
        </div>
        <div className="btn-group">
          <button className="btn btn-primary" onClick={generateDraft} disabled={loading}>
            {loading ? <span className="loading-pulse">⚡ Generating…</span> : '⚡ Generate Draft'}
          </button>
          {draft && (
            <button className="btn btn-secondary copy-btn" onClick={copyToClipboard}>
              {copied ? '✓ Copied!' : '📋 Copy'}
            </button>
          )}
        </div>
      </div>

      {(draft || error || loading) && (
        <div className="card">
          <div className="card-header">
            <h2>Generated Draft</h2>
            {draft && <span className="rag green"><span className="rag-dot"></span>Ready</span>}
          </div>
          <div className="draft-area">
            {loading && <span className="loading-pulse" style={{ color: 'var(--text3)' }}>Claude is drafting your weekly status update…</span>}
            {error && <span style={{ color: 'var(--red)' }}>{error}</span>}
            {draft && draft}
          </div>
        </div>
      )}

      {/* Epic data preview */}
      <div className="card">
        <div className="card-header"><h2>Data Being Used</h2><span style={{ fontSize: '11px', color: 'var(--text3)' }}>Live from dashboard state</span></div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {EPICS.map(e => {
            const rag = calcRAG(e.lastUpdated, e.nextMilestone);
            return (
              <div key={e.id} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '8px 0', borderBottom: '1px solid var(--border)', fontSize: '12px' }}>
                <span className="epic-id">{e.id}</span>
                <span style={{ flex: 1 }}>{e.name}</span>
                <RagBadge rag={rag} />
                <span style={{ color: 'var(--text3)', minWidth: '40px' }}>{e.progress}%</span>
                <span style={{ color: 'var(--text3)', minWidth: '60px' }}>Due {daysUntil(e.nextMilestone)}d</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── TAB: AUTOMATIONS ────────────────────────────────────────────────────────
function TabAutomations() {
  const [autos, setAutos] = useState(AUTOMATIONS);

  const toggle = (id) => {
    setAutos(prev => prev.map(a => a.id === id ? { ...a, enabled: !a.enabled } : a));
  };

  const activeCount = autos.filter(a => a.enabled).length;

  return (
    <div className="page section-gap">
      <div className="grid-3">
        <div className="kpi blue">
          <div className="kpi-label">⚡ Active Automations</div>
          <div className="kpi-value">{activeCount}</div>
          <div className="kpi-sub">of {autos.length} configured</div>
        </div>
        <div className="kpi green">
          <div className="kpi-label">✅ Last Run</div>
          <div className="kpi-value" style={{ fontSize: '16px', lineHeight: 1.4 }}>Today</div>
          <div className="kpi-sub">Weekly digest ran 08:00</div>
        </div>
        <div className="kpi amber">
          <div className="kpi-label">⚙ Manual Pending</div>
          <div className="kpi-value">{autos.filter(a => !a.enabled).length}</div>
          <div className="kpi-sub">Disabled automations</div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Automation Registry</h2>
          <span className="chip">{activeCount} active</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))', gap: '12px' }}>
          {autos.map(a => (
            <div key={a.id} className="auto-card">
              <div className="auto-card-header">
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <div className="auto-name">{a.name}</div>
                  <span className={`tag ${a.type === 'auto' ? 'tag-auto' : 'tag-manual'}`}>
                    {a.type === 'auto' ? '⚡ AUTO' : '🖱 MANUAL'}
                  </span>
                </div>
                <div className="toggle-wrap">
                  <span style={{ fontSize: '10px', color: 'var(--text3)' }}>{a.enabled ? 'ON' : 'OFF'}</span>
                  <div className={`toggle ${a.enabled ? 'on' : ''}`} onClick={() => toggle(a.id)}>
                    <div className="toggle-knob"></div>
                  </div>
                </div>
              </div>
              <div className="auto-desc">{a.desc}</div>
              <div style={{ marginTop: '10px', fontSize: '10px', color: 'var(--text3)' }}>Last run: {a.lastRun}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-header"><h2>Integration Status</h2></div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {[
            { name: 'Jira (Data Demand)', status: 'connected', note: 'Read + comment access' },
            { name: 'Confluence (FS Tribe)', status: 'connected', note: 'Read + write access' },
            { name: 'Power BI Workspace', status: 'connected', note: 'Read-only metrics' },
            { name: 'Starburst / Trino', status: 'partial', note: 'Metrics API pending infra ticket DPD-888' },
            { name: 'Microsoft Teams', status: 'pending', note: 'Not yet configured' },
          ].map((item, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '8px 0', borderBottom: '1px solid var(--border)', fontSize: '12px' }}>
              <RagBadge rag={item.status === 'connected' ? 'green' : item.status === 'partial' ? 'amber' : 'red'} />
              <span style={{ fontWeight: 500, minWidth: '200px' }}>{item.name}</span>
              <span style={{ color: 'var(--text3)' }}>{item.note}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
const TABS = [
  { id: 'portfolio', label: 'Portfolio Health', icon: '📊' },
  { id: 'deps', label: 'Dependency Map', icon: '🔗' },
  { id: 'weekly', label: 'Weekly Draft', icon: '✍️' },
  { id: 'auto', label: 'Automations', icon: '⚡' },
];

function App() {
  const [activeTab, setActiveTab] = useState('portfolio');

  const epicsWithRAG = EPICS.map(e => ({ ...e, rag: calcRAG(e.lastUpdated, e.nextMilestone) }));
  const redCount = epicsWithRAG.filter(e => e.rag === 'red').length;
  const openDec = EPICS.flatMap(e => e.decisions).filter(d => d.status === 'open').length;

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <div className="logo-badge">FS</div>
          <div>
            <div className="topbar-title">FS Portfolio Intelligence</div>
            <div className="topbar-sub">TVG · Data Demand Programme · Financial Services Tribe</div>
          </div>
        </div>
        <div className="topbar-right">
          {redCount > 0 && (
            <span className="rag red" style={{ cursor: 'pointer' }} onClick={() => setActiveTab('portfolio')}>
              <span className="rag-dot"></span>
              {redCount} RED
            </span>
          )}
          {openDec > 0 && (
            <span className="rag amber" style={{ cursor: 'pointer' }} onClick={() => setActiveTab('portfolio')}>
              <span className="rag-dot"></span>
              {openDec} decisions
            </span>
          )}
          <span className="last-updated">
            🕐 {TODAY.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })}
          </span>
        </div>
      </div>

      <div className="tab-bar">
        {TABS.map(tab => (
          <div
            key={tab.id}
            className={`tab ${activeTab === tab.id ? 'active' : ''}`}
            onClick={() => setActiveTab(tab.id)}
          >
            <span className="tab-icon">{tab.icon}</span>
            {tab.label}
          </div>
        ))}
      </div>

      <div>
        {activeTab === 'portfolio' && <TabPortfolio />}
        {activeTab === 'deps' && <TabDependencies />}
        {activeTab === 'weekly' && <TabWeeklyDraft />}
        {activeTab === 'auto' && <TabAutomations />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
