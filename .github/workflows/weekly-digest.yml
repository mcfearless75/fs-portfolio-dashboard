name: Monday Digest Email

on:
  schedule:
    # 07:30 BST (06:30 UTC) every Monday
    - cron: '30 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate but do not send or commit'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  digest:
    name: Generate and send weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install anthropic requests

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          REPORT_MODE: digest
        run: python .github/scripts/gen_reports.py

      - name: Commit report
        if: inputs.dry_run != true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "report: weekly digest $(date -u '+%Y-%m-%d') [skip ci]"
          git push || true

      - name: Summary
        if: always()
        run: |
          echo "### Monday Digest" >> $GITHUB_STEP_SUMMARY
          if [ -f .github/report_result.md ]; then cat .github/report_result.md >> $GITHUB_STEP_SUMMARY; fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** https://mcfearless75.github.io/fs-portfolio-dashboard/" >> $GITHUB_STEP_SUMMARY
