name: Sync Jira → Dashboard

on:
  schedule:
    # 06:45 UTC = 07:45 BST (UTC+1, Apr–Oct) / 06:45 GMT (Nov–Mar)
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — fetch Jira data but do not commit changes'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Fetch Jira data and update dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run Jira sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python .github/scripts/sync_jira.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to index.html"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in index.html"
            git diff --stat index.html
          fi

      - name: Commit and push updated dashboard
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          SYNC_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: Jira sync ${SYNC_TIME}

          Auto-updated from Jira REST API — status, progress and lastUpdated
          fields refreshed for DPD-757, DPD-754, DPD-905, DPD-901, DPD-915.
          [skip ci]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Jira Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .github/sync_result.md ]; then
            cat .github/sync_result.md >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** https://mcfearless75.github.io/fs-portfolio-dashboard/" >> $GITHUB_STEP_SUMMARY
